[tools]
actionlint = "latest"
betterleaks = "latest"
biome = "latest"
editorconfig-checker = "latest"
ghalint = "latest"
"github:mhersson/mpls" = "latest"
hk = "latest"
jsonschema = "latest"
marksman = "latest"
pinact = "latest"
pkl = "latest"
rumdl = "latest"
tombi = "latest"
typos = "latest"
zizmor = "latest"
dotnet = "10"
"dotnet:OPCFoundation.Opc.Ua.ModelCompiler.Tool" = "2.8.15"

[tools.rust]
version = "1.96.0"
components = "rust-analyzer"
profile = "default"

[settings]
minimum_release_age = "7d"

[hooks]
enter = "mise outdated --local --silent"
