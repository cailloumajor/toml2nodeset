[tools]
actionlint = "latest"
betterleaks = "latest"
biome = "latest"
editorconfig-checker = "latest"
ghalint = "latest"
"github:mhersson/mpls" = "latest"
hk = "latest"
jsonschema = "latest"
marksman = "latest"
pinact = "latest"
pkl = "latest"
rumdl = "latest"
tombi = "latest"
typos = "latest"
zizmor = "latest"
dotnet = "10"
"dotnet:OPCFoundation.Opc.Ua.ModelCompiler.Tool" = "2.8.15"

[tools.rust]
version = "1.96.0"
components = "rust-analyzer"
profile = "default"

[settings]
minimum_release_age = "7d"

[hooks]
enter = "mise outdated --local --silent"

[tasks.test]
description = "Run tests"
run = "cargo test"

[tasks.lint]
description = "Run hk lints"
run = "hk check --all"

[tasks.ci]
description = "Run CI related tasks"
depends = ["lint", "test"]
run = "echo 'CI completed successfully'"
